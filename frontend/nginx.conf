server {
    listen 80;
    server_name _;
    
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Frontend (Vue SPA)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        set $backend http://backend:5555;
        rewrite ^/api/(.*) /api/$1 break;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 2G;
    }

    # Copernicus service proxy
    location /copernicus/ {
        set $copernicus http://copernicus:8000;
        rewrite ^/copernicus/(.*) /$1 break;
        proxy_pass $copernicus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        client_max_body_size 2G;
    }

    # GeoServer WMS proxy
    location /geoserver/ {
        set $geoserver http://geoserver:8080;
        rewrite ^/geoserver/(.*) /geoserver/$1 break;
        proxy_pass $geoserver;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}