version: '3.8'
services:
  # AI Canopy Height Processor Service
  ai-ch-processor:
    build:
      context: ./service.ai-ch-processor
      dockerfile: Dockerfile
    container_name: ai-ch-processor
    ports:
      - "5556:5555"
    volumes:
      # Shared data directory (pentru Sentinel-2 images)
      - ./shared-data:/app/test_data
      # Output directory (pentru GeoTIFF results)
      - ./service.ai-ch-processor/output:/app/output
    environment:
      - INPUT_DATA_DIR=/app/test_data
    restart: unless-stopped
    networks:
      - geoflowcraft-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # AI Super-Resolution Processor Service
  ai-sr-processor:
    build:
      context: ./service.ai-sr-processor
      dockerfile: Dockerfile
    container_name: ai-sr-processor
    ports:
      - "5557:5555"
    volumes:
      # Shared data — primește GeoTIFF-urile S2+S1 de la backend
      - ./shared-data:/app/input_data
      # Output — GeoTIFF-uri super-rezolvate
      - ./service.ai-sr-processor/output:/app/output
    restart: unless-stopped
    networks:
      - geoflowcraft-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Backend API (Node.js)
  # Uncomment to run backend in Docker
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: geoflowcraft-backend
  #   ports:
  #     - "5555:5555"
  #   environment:
  #     - NODE_ENV=production
  #   depends_on:
  #     - ai-ch-processor
  #     - ai-sr-processor
  #   networks:
  #     - geoflowcraft-network

  # Copernicus Service (Python FastAPI)
  # Uncomment to run Copernicus service in Docker
  # copernicus:
  #   build:
  #     context: ./service.copernicus
  #     dockerfile: Dockerfile
  #   container_name: copernicus-service
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ./shared-data:/app/downloads
  #   environment:
  #     - DOWNLOAD_DIR=/app/downloads
  #   env_file:
  #     - ./service.copernicus/.env
  #   networks:
  #     - geoflowcraft-network

  mongodb:
      image: mongo:7
      container_name: geoflowcraft-mongodb
      ports:
        - "27017:27017"
      environment:
        - MONGO_INITDB_ROOT_USERNAME=admin
        - MONGO_INITDB_ROOT_PASSWORD=admin
      volumes:
        - mongodb-data:/data/db
      restart: unless-stopped
      networks:
        - geoflowcraft-network
      healthcheck:
        test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
        interval: 30s
        timeout: 10s
        retries: 3

networks:
  geoflowcraft-network:
    driver: bridge

volumes:
  shared-data:
  ai-output:
  mongodb-data: