version: '3.8'

services:

  # ─── Frontend (Vue 3 + Nginx reverse proxy) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: geoflowcraft-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
      - copernicus
    restart: unless-stopped
    networks:
      - geoflowcraft-network

  # ─── Backend (Node.js/Express) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geoflowcraft-backend
    ports:
      - "5555:5555"
    environment:
      - NODE_ENV=production
      - PORT=5555
      # MongoDB
      - MONGODB_URL=mongodb://admin:admin@mongodb:27017
      # PostgreSQL (GeoServer)
      - POSTGRES_HOST=geoserver-db
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=gis
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      # GeoServer (intern Docker — port 8080)
      - GEOSERVER_URL=http://geoserver:8080/geoserver
      - GEOSERVER_USERNAME=admin
      - GEOSERVER_PASSWORD=admin
      - GEOSERVER_DEFAULT_WORKSPACE=default_workspace
      - GEOSERVER_REMOTE_BASE_PATH=data
      - GEOSERVER_PUBLIC_URL=/geoserver
      # Căi partajate — ACELEAȘI în toate containerele
      - SHARED_DATA_DIR=/data/shared
      - SR_OUTPUT_DIR=/data/sr-output
      - CHM_OUTPUT_DIR=/data/chm-output
      - CHM_CHANGE_RESULTS_DIR=/data/chm-change-results
      - CD_SR_RESULTS_DIR=/data/sr-output/change_detection_results
      # URL-uri servicii interne
      - COPERNICUS_URL=http://copernicus:8000
      - SR_PROCESSOR_URL=http://ai-sr-processor:5555
      - CHM_PROCESSOR_URL=http://ai-ch-processor:5555
    volumes:
      - ./shared-data:/data/shared
      - ./service.ai-sr-processor/output:/data/sr-output
      - ./service.ai-ch-processor/output:/data/chm-output
      - ./shared-data/chm_change_results:/data/chm-change-results
      - ./service.ai-sr-processor/output/change_detection_results:/data/cd-sr-results
    depends_on:
      mongodb:
        condition: service_healthy
      geoserver:
        condition: service_started
    restart: unless-stopped
    networks:
      - geoflowcraft-network

  # ─── Copernicus Service (Python FastAPI) ───
  copernicus:
    build:
      context: ./service.copernicus
      dockerfile: Dockerfile
    container_name: copernicus-service
    ports:
      - "8000:8000"
    volumes:
      - ./shared-data:/data/shared
      - ./service.ai-sr-processor/output:/data/sr-output
      - ./service.ai-ch-processor/output:/data/chm-output
      - ./shared-data/chm_change_results:/data/chm-change-results
    environment:
      - DOWNLOAD_DIR=/data/shared
    env_file:
      - ./service.copernicus/.env
    restart: unless-stopped
    networks:
      - geoflowcraft-network

  # ─── AI Super Resolution Processor ───
  ai-sr-processor:
    image: geoflowcraft-ai-sr-processor:latest
    container_name: ai-sr-processor
    ports:
      - "5557:5555"
    volumes:
      - ./shared-data:/app/input_data
      - ./service.ai-sr-processor/output:/app/output
    restart: unless-stopped
    networks:
      - geoflowcraft-network

  # ─── AI Canopy Height Processor ───
  ai-ch-processor:
    image: geoflowcraft-ai-ch-processor:latest
    container_name: ai-ch-processor
    ports:
      - "5556:5555"
    volumes:
      - ./shared-data:/app/test_data
      - ./service.ai-ch-processor/output:/app/output
    environment:
      - INPUT_DATA_DIR=/data/shared
    restart: unless-stopped
    networks:
      - geoflowcraft-network

  # ─── GeoServer ───
  geoserver:
    image: kartoza/geoserver
    container_name: geoflowcraft-geoserver
    ports:
      - "5433:8080"
    volumes:
      - ./backend/data_geoserver:/opt/geoserver/data_dir
    environment:
      - DB_BACKEND=POSTGRES
      - HOST=geoserver-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=gis
      - POSTGRES_USER=postgres
      - POSTGRES_PASS=postgres
      - GEOSERVER_ADMIN_USER=admin
      - GEOSERVER_ADMIN_PASSWORD=admin
      - CORS_ENABLED=true
      - CORS_ALLOWED_ORIGINS=*
      - CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE,HEAD,OPTIONS
      - CORS_ALLOWED_HEADERS=*
      - GEOSERVER_SANDBOX_ENABLED=false
    depends_on:
      - geoserver-db
    restart: unless-stopped
    networks:
      - geoflowcraft-network

  # ─── PostGIS (for GeoServer) ───
  geoserver-db:
    image: postgis/postgis
    container_name: geoflowcraft-postgis
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=gis
    volumes:
      - postgis-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - geoflowcraft-network

  # ─── MongoDB ───
  mongodb:
    image: mongo:7
    container_name: geoflowcraft-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    networks:
      - geoflowcraft-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  geoflowcraft-network:
    driver: bridge

volumes:
  postgis-data:
  mongodb-data: